</head><body>

<div class="card">

<div id="rs"></div>

<script>
var GK = '';
var GM = false;
var FJ = null;
var HI = [];
var TI = null;
var SI = 0;
var ST = ['Session active','Regime refuge','Scan FJ/Trump','US30+VIX+DXY','Prix XAU/USD','Signal H1/H4'];

var MK = {sig:'SELL',conf:72,reg:'DOLLAR_REFUGE',reg_note:'VIX 31 + guerre Iran',vix:'31.2',vix_dir:'monte',us30:'45800',us30_var:'-1.7%',dxy:'99.8',y10:'4.41%',xau:'4380',xau_var:'-2.3%',trump:'Pas de deal Iran ultimatum',fed:'Fed hawkish 1 coupe 2026',geo:'Guerre Iran Hormuz bloque',h1:'SELL',h4:'SELL',h1_note:'Sous MM50 baissier',h4_note:'4 semaines rouges',entree:'4400-4420',sl:'4480',tp:'4200',resume:'DOLLAR REFUGE VIX monte or baisse SELL sur rebonds',alerte:'Trump deadline 6 avril risque spike'};

(function() {
  try {
    var k = localStorage.getItem('gk');
    if (k && k.length > 5) {
      GK = k;
      document.getElementById('keysec').style.display = 'none';
      document.getElementById('lu').textContent = 'Cle Gemini chargee';
    }
  } catch(e) {}
})();

function doSave() {
  var v = document.getElementById('ki').value.trim();
  if (!v) { document.getElementById('ks').textContent = 'Champ vide'; return; }
  GK = v;
  try { localStorage.setItem('gk', v); } catch(e) {}
  document.getElementById('keysec').style.display = 'none';
  document.getElementById('lu').textContent = 'Cle sauvegardee OK';
}

function doMock() {
  GM = !GM;
  var b = document.getElementById('mb');
  if (GM) {
    b.textContent = 'MOCK ON';
    b.style.background = 'rgba(255,204,68,.15)';
    b.style.color = '#ffcc44';
  } else {
    b.textContent = 'MOCK';
    b.style.background = 'rgba(255,255,255,.02)';
    b.style.color = '#3a5070';
  }
}

function tick() {
  try {
    var t = new Date().toLocaleTimeString('fr-FR');
    document.getElementById('clk').textContent = t;
    var h = new Date().getHours();
    var sid = (h >= 23 || h < 7) ? 'ASIE' : (h >= 7 && h < 16) ? 'EUROPE' : 'AMERIQUE';
    var c = sid === 'ASIE' ? '#ff6644' : sid === 'EUROPE' ? '#44aaff' : '#00ff88';
    document.getElementById('sess').textContent = 'LIVE - SESSION ' + sid;
    document.getElementById('sess').style.color = c;
    document.getElementById('clk').style.color = c;
  } catch(e) {}
}
tick();
setInterval(tick, 1000);

function cj(s) {
  var o = '', b = false, x = false;
  for (var i = 0; i < s.length; i++) {
    var c = s.charAt(i);
    if (x) { o += c; x = false; continue; }
    if (c === '\\') { o += c; x = true; continue; }
    if (c === '"') { b = !b; o += c; continue; }
    if (b) {
      if (c === "'") { o += ' '; continue; }
      if (c.charCodeAt(0) < 32) { o += ' '; continue; }
    } else {
      if (c === '\n' || c === '\r') { o += ' '; continue; }
    }
    o += c;
  }
  return o.replace(/,\s*}/g, '}').replace(/,\s*]/g, ']');
}

function pj(txt) {
  // Try to find JSON block containing "sig" key
  var best = null;
  var pos = 0;
  while (true) {
    var s = txt.indexOf('{', pos);
    if (s < 0) break;
    var e = txt.lastIndexOf('}');
    if (e <= s) break;
    var sl = txt.slice(s, e + 1);
    if (sl.indexOf('"sig"') >= 0 || sl.indexOf('"signal"') >= 0) {
      try { best = JSON.parse(sl); break; } catch(e1) {
        try { best = JSON.parse(cj(sl)); break; } catch(e2) {}
      }
    }
    pos = s + 1;
  }
  if (best) return best;
  // Fallback: extract key fields with regex
  var sig = (txt.match(/"sig"\s*:\s*"(BUY|SELL|WAIT)"/) || txt.match(/"signal"\s*:\s*"(BUY|SELL|WAIT)"/)) || [];
  var conf = txt.match(/"conf(?:idence)?"\s*:\s*(\d+)/);
  var xau = txt.match(/"xau"\s*:\s*"([^"]+)"/);
  var reg = txt.match(/"reg(?:ime)?"\s*:\s*"(OR_REFUGE|DOLLAR_REFUGE|RISK_ON)"/);
  var resume = txt.match(/"resume"\s*:\s*"([^"]{5,80})"/);
  var alerte = txt.match(/"alerte"\s*:\s*"([^"]{5,80})"/);
  var entree = txt.match(/"entree"\s*:\s*"([^"]+)"/);
  var sl2 = txt.match(/"sl"\s*:\s*"([^"]+)"/);
  var tp = txt.match(/"tp"\s*:\s*"([^"]+)"/);
  var vix = txt.match(/"vix"\s*:\s*"([^"]+)"/);
  var vixd = txt.match(/"vix_dir"\s*:\s*"([^"]+)"/);
  var h1 = txt.match(/"h1"\s*:\s*"(BUY|SELL|WAIT)"/);
  var h4 = txt.match(/"h4"\s*:\s*"(BUY|SELL|WAIT)"/);
  return {
    sig: (sig[1] || 'WAIT'), conf: parseInt(conf && conf[1] || '55'),
    reg: (reg && reg[1] || 'DOLLAR_REFUGE'), reg_note: 'Extrait auto',
    vix: (vix && vix[1] || '?'), vix_dir: (vixd && vixd[1] || 'stable'),
    xau: (xau && xau[1] || '?'), xau_var: '?', us30: '?', us30_var: '?', dxy: '?', y10: '?',
    trump: '', fed: '', geo: '',
    h1: (h1 && h1[1] || 'WAIT'), h4: (h4 && h4[1] || 'WAIT'), h1_note: '', h4_note: '',
    entree: (entree && entree[1] || '?'), sl: (sl2 && sl2[1] || '?'), tp: (tp && tp[1] || '?'),
    resume: (resume && resume[1] || 'Signal extrait auto'), alerte: (alerte && alerte[1] || '')
  };
}

function gm(sys, usr, tok, cb) {
  if (!GK) { cb(new Error('Cle API manquante')); return; }
  var xhr = new XMLHttpRequest();
  var url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + GK;
  xhr.open('POST', url);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.timeout = 60000;
  xhr.ontimeout = function() { cb(new Error('Timeout')); };
  xhr.onerror = function() { cb(new Error('Erreur reseau')); };
  xhr.onload = function() {
    try {
      var d = JSON.parse(xhr.responseText);
      if (d.error) { cb(new Error(d.error.message || 'Gemini error')); return; }
      var txt = '';
      if (d.candidates && d.candidates[0] && d.candidates[0].content && d.candidates[0].content.parts) {
        var pts = d.candidates[0].content.parts;
        for (var i = 0; i < pts.length; i++) {
          if (pts[i].text) txt += pts[i].text;
        }
      }
      if (!txt) { cb(new Error('Reponse vide')); return; }
      cb(null, txt);
    } catch(ex) { cb(ex); }
  };
  var body = {
    systemInstruction: {parts:[{text:sys}]},
    contents: [{role:'user',parts:[{text:usr}]}],
    generationConfig: {maxOutputTokens: tok || 600, temperature: 0.3},
    tools: [{google_search:{}}]
  };
  xhr.send(JSON.stringify(body));
}

function doFJ() {
  document.getElementById('fj').textContent = 'Scan en cours...';
  var sys = 'Cherche headlines recentes financialjuice.com impactant XAU/USD. JSON uniquement: {"h":[{"t":"headline","heure":"HH:MM","niv":"CRITIQUE|ELEVE|MODERE","imp":"haussier|baissier|neutre"}],"resume":"synthese"}';
  gm(sys, 'Headlines FinancialJuice or maintenant', 400, function(err, txt) {
    if (err) { document.getElementById('fj').innerHTML = 'Erreur: ' + err.message; return; }
    try {
      FJ = pj(txt);
      var h = '';
      if (FJ.resume) h += '<div style="font-size:11px;color:#6a8890;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.05)">' + FJ.resume + '</div>';
      var arr = FJ.h || [];
      for (var i = 0; i < arr.length; i++) {
        var it = arr[i];
        var col = it.niv === 'CRITIQUE' ? '#ff2244' : it.niv === 'ELEVE' ? '#ff8822' : '#ffcc44';
        var ic = it.imp === 'haussier' ? '▲' : it.imp === 'baissier' ? '▼' : '●';
        var icc = it.imp === 'haussier' ? '#00ff88' : it.imp === 'baissier' ? '#ff4466' : '#ffcc44';
        h += '<div style="border-left:3px solid ' + col + ';padding:6px 10px;margin-bottom:4px;display:flex;justify-content:space-between;gap:8px">';
        h += '<div><div style="font-size:9px;color:' + col + ';font-weight:bold">' + it.niv + (it.heure ? ' ' + it.heure : '') + '</div>';
        h += '<div style="font-size:11px;color:#8aaccc">' + it.t + '</div></div>';
        h += '<span style="color:' + icc + ';font-size:14px;font-weight:bold">' + ic + '</span></div>';
      }
      document.getElementById('fj').innerHTML = h || 'Aucune headline';
    } catch(ex) { document.getElementById('fj').textContent = 'Parse error'; }
  });
}

function getP() {
  var h = new Date().getHours();
  var sid = (h >= 23 || h < 7) ? 'ASIE' : (h >= 7 && h < 16) ? 'EUROPE' : 'AMERIQUE';
  var fjtxt = '';
  if (FJ && FJ.h && FJ.h.length > 0) {
    var tops = [];
    for (var i = 0; i < Math.min(3, FJ.h.length); i++) tops.push(FJ.h[i].t);
    fjtxt = 'Headlines FJ: ' + tops.join(' | ');
  }
  return 'Expert XAU/USD. Session: ' + sid + '. ' + fjtxt + '\nREGIME: VIX>25 OU guerre = DOLLAR_REFUGE (or baisse si VIX monte). US30 remonte = fin appels marge = or rebondit. OR_REFUGE si VIX<20 ET pas guerre.\nCherche sur web: XAU prix, US30, DXY, VIX direction, US10Y, news Trump, Fed, Iran.\nJSON sur une ligne (zero apostrophe):\n{"sig":"SELL","conf":72,"reg":"DOLLAR_REFUGE","reg_note":"raison","vix":"31","vix_dir":"monte","us30":"45800","us30_var":"-1.7%","dxy":"99.8","y10":"4.41%","xau":"4380","xau_var":"-2.1%","trump":"post","fed":"annonce","geo":"Iran","h1":"SELL","h4":"SELL","h1_note":"raison","h4_note":"raison","entree":"4400-4420","sl":"4480","tp":"4200","resume":"signal 20 mots","alerte":"alerte"}';
}

function doScan() {
  if (!GM && !GK) {
    document.getElementById('keysec').style.display = 'block';
    document.getElementById('er').style.display = 'block';
    document.getElementById('er').textContent = 'Colle ta cle Gemini et clique Sauver';
    return;
  }
  document.getElementById('ld').style.display = 'block';
  document.getElementById('rs').innerHTML = '';
  document.getElementById('er').style.display = 'none';
  document.getElementById('sb').disabled = true;
  document.getElementById('sb').textContent = 'ANALYSE...';
  SI = 0;
  clearInterval(TI);
  TI = setInterval(function() {
    SI = Math.min(SI + 1, ST.length - 1);
    var h = '';
    for (var i = 0; i < ST.length; i++) {
      var col = i < SI ? 'rgba(0,255,136,.4)' : (i === SI ? '#00ff88' : '#1a2e40');
      var mk = i < SI ? 'v' : (i === SI ? '>' : 'o');
      h += '<div style="font-size:10px;padding:3px 0;display:flex;gap:8px;color:' + col + '"><span>' + mk + '</span>' + ST[i] + '</div>';
    }
    document.getElementById('st').innerHTML = h;
  }, 1200);

  function done(raw) {
    clearInterval(TI);
    document.getElementById('ld').style.display = 'none';
    document.getElementById('sb').disabled = false;
    document.getElementById('sb').textContent = 'ANALYSER';
    showR(raw);
    HI = HI.slice(-9);
    HI.push({raw:raw, t:new Date().toLocaleTimeString('fr-FR')});
    document.getElementById('lu').textContent = 'Analyse: ' + new Date().toLocaleTimeString('fr-FR') + ' - ' + HI.length + ' signal(s)';
  }

  function fail(msg) {
    clearInterval(TI);
    document.getElementById('ld').style.display = 'none';
    document.getElementById('sb').disabled = false;
    document.getElementById('sb').textContent = 'ANALYSER';
    document.getElementById('er').style.display = 'block';
    document.getElementById('er').textContent = 'Erreur: ' + msg;
  }

  if (GM) {
    setTimeout(function() { done(MK); }, 1500);
    return;
  }

  gm(getP(), 'Analyse XAU/USD ' + new Date().toLocaleString('fr-FR'), 600, function(err, txt) {
    if (err) { fail(err.message); return; }
    try { done(pj(txt)); } catch(ex) { fail(ex.message); }
  });
}

function showR(raw) {
  var vv = parseFloat(raw.vix || '0');
  var vm = raw.vix_dir === 'monte';
  var reg = raw.reg || 'DOLLAR_REFUGE';

  var sc = raw.sig === 'BUY' ? '#00ff88' : raw.sig === 'SELL' ? '#ff4466' : '#ffcc44';
  var si = raw.sig === 'BUY' ? '▲' : raw.sig === 'SELL' ? '▼' : '●';
  var rc = reg === 'DOLLAR_REFUGE' ? {icon:'💵',label:'DOLLAR = REFUGE',c:'#4488ff'} : reg === 'OR_REFUGE' ? {icon:'🥇',label:'OR = REFUGE',c:'#d4a853'} : {icon:'🔥',label:'RISK-ON',c:'#ff6644'};

  var h = '';

  h += '<div class="card" style="border-color:' + rc.c + '33;background:' + rc.c + '0d;margin-bottom:12px">';

  h += '<div><div style="font-size:9px;color:' + rc.c + ';font-weight:bold;letter-spacing:2px;margin-bottom:4px">REGIME - ' + rc.label + '</div>';
  h += '<div style="font-size:11px;color:' + rc.c + 'bb;line-height:1.6">' + (raw.reg_note || '') + '</div></div></div></div>';

  var sc1 = raw.h1 === 'BUY' ? '#00ff88' : raw.h1 === 'SELL' ? '#ff4466' : '#ffcc44';
  var sc4 = raw.h4 === 'BUY' ? '#00ff88' : raw.h4 === 'SELL' ? '#ff4466' : '#ffcc44';
  h += '<div class="card" style="margin-bottom:12px">';
  h += '<div style="font-size:9px;color:#4a7090;letter-spacing:3px;margin-bottom:10px">MULTI-TIMEFRAME H1/H4</div>';
  h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">';
  h += '<div style="background:' + sc1 + '0a;border:1px solid ' + sc1 + '33;border-radius:8px;padding:10px">';
  h += '<div style="font-size:9px;color:' + sc1 + ';font-weight:bold;margin-bottom:4px">H1</div>';
  h += '<div style="font-size:22px;font-weight:bold;color:' + sc1 + '">' + (raw.h1 === 'BUY' ? '▲' : raw.h1 === 'SELL' ? '▼' : '●') + ' ' + (raw.h1 || 'WAIT') + '</div>';
  h += '<div style="font-size:9px;color:' + sc1 + '88;margin-top:4px">' + (raw.h1_note || '') + '</div></div>';
  h += '<div style="background:' + sc4 + '0a;border:1px solid ' + sc4 + '33;border-radius:8px;padding:10px">';
  h += '<div style="font-size:9px;color:' + sc4 + ';font-weight:bold;margin-bottom:4px">H4</div>';
  h += '<div style="font-size:22px;font-weight:bold;color:' + sc4 + '">' + (raw.h4 === 'BUY' ? '▲' : raw.h4 === 'SELL' ? '▼' : '●') + ' ' + (raw.h4 || 'WAIT') + '</div>';
  h += '<div style="font-size:9px;color:' + sc4 + '88;margin-top:4px">' + (raw.h4_note || '') + '</div></div></div>';
  var ccol = raw.h1 === raw.h4 ? '#00ff88' : '#ffcc44';
  h += '<div style="text-align:center;font-size:10px;color:' + ccol + ';font-weight:bold">' + (raw.h1 === raw.h4 ? 'SIGNAUX ALIGNES' : 'SIGNAUX DIVERGENTS') + '</div></div>';

  h += '<div class="card" style="border-color:' + sc + '44;background:rgba(0,0,0,.5);margin-bottom:12px">';
  h += '<div style="font-size:9px;color:#2a4060;letter-spacing:3px;margin-bottom:6px">SIGNAL FINAL - XAU/USD</div>';
  h += '<div style="font-size:48px;font-weight:bold;color:' + sc + ';line-height:1;margin-bottom:8px">' + si + ' ' + (raw.sig || 'WAIT') + '</div>';
  h += '<div style="font-size:12px;color:#6a8aaa;line-height:1.6;margin-bottom:10px">' + (raw.resume || '') + '</div>';
  h += '<div style="font-size:10px;color:#3a5060">CONFIANCE: <span style="color:' + sc + ';font-size:14px;font-weight:bold">' + (raw.conf || 55) + '%</span></div></div>';

  h += '<div class="card" style="margin-bottom:12px"><div style="font-size:9px;color:#4a7090;letter-spacing:3px;margin-bottom:10px">MARCHES</div>';
  h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
  var ms = [
    {a:'XAU/USD',p:raw.xau,v:raw.xau_var,ico:'🥇',c:'#d4a853'},
    {a:'US30',p:raw.us30,v:raw.us30_var,ico:'📈',c:'#ff6644'},
    {a:'DXY',p:raw.dxy,v:'-',ico:'💵',c:'#4488ff'},
    {a:'VIX',p:raw.vix,v:vm?'▲':'▼',ico:'😱',c:'#ff44aa'}
  ];
  for (var i = 0; i < ms.length; i++) {
    var m = ms[i];
    if (!m.p || m.p === '?') continue;
    var vc = m.v && m.v.indexOf('-') >= 0 ? '#ff4466' : '#00ff88';
    h += '<div style="background:rgba(0,0,0,.3);border:1px solid ' + m.c + '22;border-radius:8px;padding:10px">';
    h += '<div style="font-size:9px;color:' + m.c + ';font-weight:bold;margin-bottom:4px">' + m.ico + ' ' + m.a + '</div>';
    h += '<div style="font-size:14px;color:#8aaccc;font-weight:bold;margin-bottom:3px">' + m.p + '</div>';
    h += '<div style="font-size:11px;color:' + vc + '">' + m.v + '</div></div>';
  }
  h += '</div></div>';

  h += '<div class="card" style="margin-bottom:12px"><div style="font-size:9px;color:#4a7090;letter-spacing:3px;margin-bottom:10px">NIVEAUX</div>';
