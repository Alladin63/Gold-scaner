<script>
// ── STATE ──
var GK = '';
var GM = false;
var FJD = null;
var HIST = [];
var ST = null;
var SI2 = 0;
var STEPS = ['Identification session','Régime refuge A/B/C','Scan Trump/FJ','US30+VIX+DXY','Prix XAU/USD','Signal final H1/H4'];
var MOCK_D = {sig:'SELL',conf:72,reg:'DOLLAR_REFUGE',reg_note:'VIX 31 + guerre Iran active',vix:'31.2',vix_dir:'monte',us30:'45800',us30_var:'-1.7%',dxy:'99.8',y10:'4.41%',xau:'4380',xau_var:'-2.3%',trump:'Pas de deal Iran',fed:'Fed hawkish 1 coupe 2026',geo:'Guerre Iran Hormuz bloque',h1:'SELL',h4:'SELL',h1_note:'Sous MM50 baissier',h4_note:'4 semaines rouges',entree:'4400-4420',sl:'4480',tp:'4200',resume:'DOLLAR REFUGE VIX monte or sous pression SELL sur rebonds',alerte:'Trump deadline 6 avril risque spike'};

// ── INIT KEY ──
try {
  var _k = localStorage.getItem('gk');
  if (_k && _k.length > 5) {
    GK = _k;
    document.getElementById('keysec').style.display = 'none';
    document.getElementById('lu').textContent = '✅ Clé Gemini chargée';
  }
} catch(e) {}

// ── CLOCK ──
function doTick() {
  try {
    var now = new Date();
    var hStr = now.toLocaleTimeString('fr-FR');
    document.getElementById('clock').textContent = hStr;
    var h = now.getUTCHours() + 1; // approx Paris (UTC+1 or +2)
    if (h >= 24) h -= 24;
    var sid, sc;
    if (h >= 23 || h < 7) { sid = 'ASIE'; sc = '#ff6644'; }
    else if (h >= 7 && h < 16) { sid = 'EUROPE'; sc = '#44aaff'; }
    else { sid = 'AMERIQUE'; sc = '#00ff88'; }
    document.getElementById('sessinfo').innerHTML = '<span style="color:' + sc + ';font-weight:bold">● LIVE · SESSION ' + sid + '</span>';
    document.getElementById('sesscard').style.borderColor = sc + '55';
    document.getElementById('clock').style.color = sc;
    document.getElementById('scanbtn').style.color = sc;
    document.getElementById('scanbtn').style.borderColor = sc + '44';
  } catch(e) {}
}
doTick();
setInterval(doTick, 1000);

// ── SAVE KEY ──
function doSave() {
  var v = '';
  try { v = document.getElementById('ki').value.trim(); } catch(e) {}
  if (!v) {
    document.getElementById('ks').textContent = '❌ Champ vide — colle ta clé';
    return;
  }
  GK = v;
  try { localStorage.setItem('gk', v); } catch(e) {}
  document.getElementById('keysec').style.display = 'none';
  document.getElementById('lu').textContent = '✅ Clé sauvegardée';
}

// ── MOCK ──
function doMock() {
  GM = !GM;
  var btn = document.getElementById('mockbtn');
  btn.textContent = GM ? '● MOCK ON' : '○ MOCK';
  btn.style.background = GM ? 'rgba(255,204,68,.1)' : 'rgba(255,255,255,.02)';
  btn.style.borderColor = GM ? 'rgba(255,204,68,.3)' : 'rgba(255,255,255,.08)';
  btn.style.color = GM ? '#ffcc44' : '#3a5070';
}

// ── CLEAN JSON ──
function cj(s) {
  var o = '', ins = false, esc = false;
  for (var i = 0; i < s.length; i++) {
    var c = s[i];
    if (esc) { o += c; esc = false; continue; }
    if (c === '\\') { o += c; esc = true; continue; }
    if (c === '"') { ins = !ins; o += c; continue; }
    if (ins) {
      if (c === "'") { o += ' '; continue; }
      if (c.charCodeAt(0) < 32) { o += ' '; continue; }
    } else {
      if (c === '\n' || c === '\r') { o += ' '; continue; }
    }
    o += c;
  }
  return o.replace(/,\s*}/g, '}').replace(/,\s*]/g, ']');
}

function parseJ(txt) {
  var s = txt.indexOf('{'), e = txt.lastIndexOf('}');
  if (s < 0) throw new Error('JSON introuvable');
  var sl = txt.slice(s, e + 1);
  try { return JSON.parse(sl); } catch(e1) {
    try { return JSON.parse(cj(sl)); } catch(e2) {
      return { sig: 'WAIT', conf: 55, reg: 'DOLLAR_REFUGE', reg_note: 'Extrait auto', vix: '?', vix_dir: 'stable', us30: '?', us30_var: '?', dxy: '?', y10: '?', xau: '?', xau_var: '?', trump: '', fed: '', geo: '', h1: 'WAIT', h4: 'WAIT', h1_note: '', h4_note: '', entree: '?', sl: '?', tp: '?', resume: 'JSON corrompu signal extrait', alerte: 'Verifier manuellement' };
    }
  }
}

// ── GEMINI ──
function callGemini(sys, usr, tok, cb) {
  if (!GK) { cb(new Error('Clé API manquante')); return; }
  var xhr = new XMLHttpRequest();
  xhr.open('POST', 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + GK);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.timeout = 60000;
  xhr.ontimeout = function() { cb(new Error('Timeout 60s — réessaie')); };
  xhr.onerror = function() { cb(new Error('Erreur réseau')); };
  xhr.onload = function() {
    try {
      var d = JSON.parse(xhr.responseText);
      if (d.error) { cb(new Error(d.error.message || 'Erreur Gemini')); return; }
      var txt = '';
      if (d.candidates && d.candidates[0] && d.candidates[0].content && d.candidates[0].content.parts) {
        for (var i = 0; i < d.candidates[0].content.parts.length; i++) {
          if (d.candidates[0].content.parts[i].text) txt += d.candidates[0].content.parts[i].text;
        }
      }
      if (!txt) { cb(new Error('Réponse vide')); return; }
      cb(null, txt);
    } catch(e) { cb(e); }
  };
  var body = JSON.stringify({
    systemInstruction: { parts: [{ text: sys }] },
    contents: [{ role: 'user', parts: [{ text: usr }] }],
    generationConfig: { maxOutputTokens: tok || 600, temperature: 0.3 },
    tools: [{ google_search: {} }]
  });
  xhr.send(body);
}

// ── FJ ──
function doFJ() {
  document.getElementById('fjcont').textContent = 'Scan FJ en cours...';
  var sys = 'Cherche sur le web les headlines recentes de financialjuice.com impactant XAU/USD. JSON uniquement (zero apostrophe): {"h":[{"t":"headline","heure":"HH:MM","niv":"CRITIQUE|ELEVE|MODERE","imp":"haussier|baissier|neutre"}],"resume":"synthese"}';
  callGemini(sys, 'Headlines FinancialJuice or maintenant', 400, function(err, txt) {
    if (err) { document.getElementById('fjcont').innerHTML = '<span style="color:#ff6644">⚠ ' + err.message + '</span>'; return; }
    try {
      FJD = parseJ(txt);
      var AC = { CRITIQUE: { c: '#ff2244', icon: '🚨' }, ELEVE: { c: '#ff8822', icon: '⚠️' }, MODERE: { c: '#ffcc44', icon: 'ℹ️' } };
      var IMP = { haussier: { c: '#00ff88', t: '▲' }, baissier: { c: '#ff4466', t: '▼' }, neutre: { c: '#ffcc44', t: '●' } };
      var h = '';
      if (FJD.resume) h += '<div style="font-size:11px;color:#6a8890;font-style:italic;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.05)">' + FJD.resume + '</div>';
      h += '<div style="display:flex;flex-direction:column;gap:5px;max-height:180px;overflow-y:auto">';
      var arr = FJD.h || [];
      for (var i = 0; i < arr.length; i++) {
        var item = arr[i];
        var a = AC[item.niv] || AC.MODERE;
        var imp = IMP[item.imp] || IMP.neutre;
        h += '<div style="border-left:3px solid ' + a.c + ';padding:6px 10px;background:rgba(255,255,255,.02);border-radius:4px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px">';
        h += '<div style="flex:1"><div style="font-size:9px;color:' + a.c + ';font-weight:bold;margin-bottom:2px">' + a.icon + ' ' + item.niv + (item.heure ? ' · ' + item.heure : '') + '</div>';
        h += '<div style="font-size:11px;color:#8aaccc;line-height:1.5">' + item.t + '</div></div>';
        h += '<span style="font-size:14px;color:' + imp.c + ';font-weight:bold">' + imp.t + '</span></div>';
      }
      h += '</div>';
      document.getElementById('fjcont').innerHTML = h;
    } catch(e) { document.getElementById('fjcont').innerHTML = '<span style="color:#ff6644">⚠ Erreur parse</span>'; }
  });
}

// ── PROMPT ──
function getPrompt() {
  var now = new Date();
  var h = now.getUTCHours() + 1;
  if (h >= 24) h -= 24;
  var sid = (h >= 23 || h < 7) ? 'ASIE' : (h >= 7 && h < 16) ? 'EUROPE' : 'AMERIQUE';
  var fj = '';
  if (FJD && FJD.h && FJD.h.length > 0) {
    var tops = FJD.h.slice(0, 3);
    var txts = [];
    for (var i = 0; i < tops.length; i++) txts.push(tops[i].t);
    fj = 'Headlines FJ: ' + txts.join(' | ');
  }
  return 'Expert XAU/USD. Session: ' + sid + '. ' + fj + '\n\nREGIME PRIORITAIRE:\n- VIX>25 OU guerre active = DOLLAR_REFUGE (or baisse quand VIX monte)\n- DOLLAR_REFUGE: US30 remonte = fin appels marge = or rebondit\n- OR_REFUGE seulement si VIX<20 ET pas de guerre\n- RISK_ON si marches calmes VIX<18\n\nCherche sur le web: XAU prix, US30, DXY, VIX direction, US10Y, news Trump, Fed, Iran.\n\nJSON uniquement sur une ligne (zero apostrophe):\n{"sig":"BUY|SELL|WAIT","conf":75,"reg":"DOLLAR_REFUGE","reg_note":"raison","vix":"31","vix_dir":"monte","us30":"45800","us30_var":"-1.7%","dxy":"99.8","y10":"4.41%","xau":"4380","xau_var":"-2.1%","trump":"post ou rien","fed":"annonce","geo":"situation","h1":"SELL","h4":"SELL","h1_note":"raison H1","h4_note":"raison H4","entree":"4400-4420","sl":"4480","tp":"4200","resume":"signal 20 mots","alerte":"alerte principale"}';
}

// ── SCAN ──
function doScan() {
  if (!GM && !GK) {
    document.getElementById('keysec').style.display = 'block';
    document.getElementById('err').style.display = 'block';
    document.getElementById('err').textContent = '⚠ Colle ta clé Gemini en haut et clique Sauver';
    return;
  }
  document.getElementById('loader').style.display = 'block';
  document.getElementById('res').innerHTML = '';
  document.getElementById('err').style.display = 'none';
  document.getElementById('scanbtn').disabled = true;
  document.getElementById('scanbtn').textContent = '⟳  ANALYSE...';
  SI2 = 0;
  clearInterval(ST);
  ST = setInterval(function() {
    SI2 = Math.min(SI2 + 1, STEPS.length - 1);
    var html = '';
    for (var i = 0; i < STEPS.length; i++) {
      var col = i < SI2 ? 'rgba(0,255,136,.4)' : (i === SI2 ? '#00ff88' : '#1a2e40');
      var mark = i < SI2 ? '✓' : (i === SI2 ? '▶' : '○');
      html += '<div style="font-size:10px;padding:3px 0;display:flex;align-items:center;gap:8px;color:' + col + '"><span>' + mark + '</span>' + STEPS[i] + '</div>';
    }
    document.getElementById('steps').innerHTML = html;
  }, 1200);

  function finish(raw) {
    clearInterval(ST);
    document.getElementById('loader').style.display = 'none';
    document.getElementById('scanbtn').disabled = false;
    document.getElementById('scanbtn').textContent = '⚡ ANALYSER MAINTENANT';
    showRes(raw);
    HIST = HIST.slice(-9);
    HIST.push({ raw: raw, t: new Date().toLocaleTimeString('fr-FR') });
    document.getElementById('lu').textContent = 'Analyse: ' + new Date().toLocaleTimeString('fr-FR') + ' · ' + HIST.length + ' signal(s)';
  }

  function fail(msg) {
    clearInterval(ST);
    document.getElementById('loader').style.display = 'none';
    document.getElementById('scanbtn').disabled = false;
    document.getElementById('scanbtn').textContent = '⚡ ANALYSER MAINTENANT';
    document.getElementById('err').style.display = 'block';
    document.getElementById('err').textContent = '⚠ ' + msg;
  }

  if (GM) {
    setTimeout(function() { finish(MOCK_D); }, 1500);
    return;
  }

  callGemini(getPrompt(), 'Analyse XAU/USD ' + new Date().toLocaleString('fr-FR'), 600, function(err, txt) {
    if (err) { fail(err.message); return; }
    try { finish(parseJ(txt)); } catch(e) { fail(e.message); }
  });
}

// ── RENDER ──
function showRes(raw) {
  var vv = parseFloat(raw.vix || 0), vm = raw.vix_dir === 'monte';
  var reg = raw.reg || 'DOLLAR_REFUGE';

  var h = '';

  if ((vv > 25 || vm) && raw.reg === 'OR_REFUGE') h += '<div class="card" style="border-color:#ffcc4433;background:rgba(255,200,0,.06);margin-bottom:8px"><span style="color:#ffcc44;font-weight:bold;font-size:10px">⚡ VIX OVERRIDE — </span><span style="font-size:11px;color:#aa8830">Régime forcé DOLLAR REFUGE car VIX élevé.</span></div>';
  if (raw.alerte) h += '<div class="card" style="border-color:rgba(255,136,34,.25);background:rgba(255,136,34,.06);margin-bottom:8px"><div style="font-size:9px;color:#ff8822;font-weight:bold;margin-bottom:4px">⚠️ ALERTE</div><div style="font-size:11px;color:#ff8822;line-height:1.5">' + raw.alerte + '</div></div>';

  h += '<div class="card" style="border-color:' + rc.c + '33;background:' + rc.c + '0d;margin-bottom:12px"><div style="display:flex;align-items:center;gap:10px"><span style="font-size:24px">' + rc.icon + '</span><div><div style="font-size:9px;color:' + rc.c + ';font-weight:bold;letter-spacing:2px;margin-bottom:4px">RÉGIME · ' + rc.label + '</div><div style="font-size:11px;color:' + rc.c + 'bb;line-height:1.6">' + (raw.reg_note || '') + '</div></div></div></div>';

  var sc1 = raw.h1 === 'BUY' ? '#00ff88' : raw.h1 === 'SELL' ? '#ff4466' : '#ffcc44';
  var sc4 = raw.h4 === 'BUY' ? '#00ff88' : raw.h4 === 'SELL' ? '#ff4466' : '#ffcc44';
  var cc = raw.h1 === raw.h4 ? '#00ff88' : '#ffcc44';
  h += '<div class="card" style="margin-bottom:12px"><div style="font-size:9px;color:#4a7090;letter-spacing:3px;margin-bottom:10px">▸ MULTI-TIMEFRAME H1/H4</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">';
  h += '<div style="background:' + sc1 + '0a;border:1px solid ' + sc1 + '33;border-radius:8px;padding:10px"><div style="font-size:9px;color:' + sc1 + ';font-weight:bold;margin-bottom:4px">H1</div><div style="font-size:22px;font-weight:bold;color:' + sc1 + '">' + (raw.h1 === 'BUY' ? '▲' : raw.h1 === 'SELL' ? '▼' : '●') + ' ' + (raw.h1 || 'WAIT') + '</div><div style="font-size:9px;color:' + sc1 + '88;margin-top:4px;line-height:1.4">' + (raw.h1_note || '') + '</div></div>';
  h += '<div style="background:' + sc4 + '0a;border:1px solid ' + sc4 + '33;border-radius:8px;padding:10px"><div style="font-size:9px;color:' + sc4 + ';font-weight:bold;margin-bottom:4px">H4</div><div style="font-size:22px;font-weight:bold;color:' + sc4 + '">' + (raw.h4 === 'BUY' ? '▲' : raw.h4 === 'SELL' ? '▼' : '●') + ' ' + (raw.h4 || 'WAIT') + '</div><div style="font-size:9px;color:' + sc4 + '88;margin-top:4px;line-height:1.4">' + (raw.h4_note || '') + '</div></div>';
  h += '</div><div style="text-align:center;font-size:10px;color:' + cc + ';font-weight:bold">' + (raw.h1 === raw.h4 ? '✓ SIGNAUX ALIGNÉS' : '⚡ SIGNAUX DIVERGENTS') + '</div></div>';

  h += '<div class="card" style="border-color:' + sc + '44;background:rgba(0,0,0,.5);margin-bottom:12px;box-shadow:0 0 30px ' + sc + '15">';
  h += '<div style="font-size:9px;color:#2a4060;letter-spacing:3px;margin-bottom:6px">SIGNAL FINAL · XAU/USD</div>';
  h += '<div style="font-size:48px;font-weight:bold;color:' + sc + ';line-height:1;margin-bottom:8px">' + si + ' ' + (raw.sig || 'WAIT') + '</div>';
  h += '<div style="font-size:12px;color:#6a8aaa;line-height:1.6;margin-bottom:10px">' + (raw.resume || '') + '</div>';
