function saveKey() {

// ═══ JSON UTILS ═══
function cleanJson(str) {
  var out = '', inStr = false, esc = false;
  for (var i = 0; i < str.length; i++) {
    var c = str[i];
    if (esc) { out += c; esc = false; continue; }
    if (c === '\\') { out += c; esc = true; continue; }
    if (c === '"') { inStr = !inStr; out += c; continue; }
    if (inStr) {
      if (c === "'") { out += ' '; continue; }
      if (c.charCodeAt(0) < 32) { out += ' '; continue; }
    } else {
      if (c === '\n' || c === '\r') { out += ' '; continue; }
    }
    out += c;
  }
  return out.replace(/,\s*}/g,'}').replace(/,\s*]/g,']');
}

function parseResp(txt) {
  var s = txt.indexOf('{'), e = txt.lastIndexOf('}');
  if (s === -1) throw new Error('JSON introuvable');
  var slice = txt.slice(s, e+1);
  try { return JSON.parse(slice); } catch(e1) {
    try { return JSON.parse(cleanJson(slice)); } catch(e2) {
      return {
        sig: (slice.match(/"sig"\s*:\s*"(BUY|SELL|WAIT)"/) || [])[1] || 'WAIT',
        conf: 55, reg: 'DOLLAR_REFUGE', reg_note: 'Extrait auto',
        vix:'?',vix_dir:'stable',us30:'?',us30_var:'?',dxy:'?',y10:'?',xau:'?',xau_var:'?',
        trump:'',fed:'',geo:'',h1:'WAIT',h4:'WAIT',h1_note:'',h4_note:'',
        entree:'Voir chart',sl:'SL strict',tp:'TP chart',
        resume:'JSON corrompu - signal extrait auto',alerte:'Verifier manuellement'
      };
    }
  }
}

// ═══ GEMINI API ═══
async function callGemini(system, user, maxTok) {
  if (!apiKey) throw new Error('Clé API manquante');
  var res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + apiKey, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      systemInstruction: {parts:[{text:system}]},
      contents: [{role:'user',parts:[{text:user}]}],
      generationConfig: {maxOutputTokens: maxTok || 600, temperature: 0.3},
      tools: [{google_search:{}}]
    })
  });
  var data = await res.json();
  if (data.error) throw new Error(data.error.message || 'Gemini error');
  var txt = '';
  if (data.candidates && data.candidates[0] && data.candidates[0].content) {
    data.candidates[0].content.parts.forEach(function(p) { if (p.text) txt += p.text; });
  }
  if (!txt) throw new Error('Réponse vide');
  return txt;
}

// ═══ NORMALIZE ═══
function normalize(raw) {
  var vv = parseFloat(raw.vix || 0);
  var vm = raw.vix_dir === 'monte';
  var reg = raw.reg || 'DOLLAR_REFUGE';
  var ovrd = (vv > 25 || vm) && reg === 'OR_REFUGE';
  if (ovrd) reg = 'DOLLAR_REFUGE';
  return {
    sig: raw.sig || 'WAIT', conf: raw.conf || 55, resume: raw.resume || '',
    vixOverride: ovrd,
    regime: {type: reg, expl: raw.reg_note || ''},
    marches: [
      {a:'XAU/USD',p:raw.xau||'?',v:raw.xau_var||'?',sig:'neutre',c:''},
      {a:'US30',p:raw.us30||'?',v:raw.us30_var||'?',sig:(raw.us30_var||'').indexOf('-')>=0?'baissier':'haussier',c:reg==='DOLLAR_REFUGE'?((raw.us30_var||'').indexOf('-')>=0?'Appels marge → or baisse':'Fin appels marge → or rebondit'):'Correlation normale'},
      {a:'DXY',p:raw.dxy||'?',v:'?',sig:'neutre',c:''},
      {a:'US10Y',p:raw.y10||'?',v:'?',sig:'neutre',c:''},
      {a:'VIX',p:raw.vix||'?',v:'?',niveau:vv>30?'panique>30':vv>25?'élevé 25-30':'modéré',sig:vm?'baissier':'haussier',c:vm?'VIX monte → dollar refuge → or baisse':'VIX stable/baisse'}
    ].filter(function(m){return m.p!=='?';}),
    news: [
      raw.trump?{src:'Trump',txt:raw.trump}:null,
      raw.fed?{src:'Fed',txt:raw.fed}:null,
      raw.geo?{src:'Géo/Iran',txt:raw.geo}:null
    ].filter(Boolean),
    mf: {H1:{sig:raw.h1||'WAIT',r:raw.h1_note||''},H4:{sig:raw.h4||'WAIT',r:raw.h4_note||''},conf:raw.h1===raw.h4?'alignés':'divergents'},
    alerte: raw.alerte || '',
    niv: {e:raw.entree||'?',sl:raw.sl||'?',tp:raw.tp||'?'}
  };
}
