// JSON cleaner
function cj(s) {
  var o='',b=false,x=false;
  for (var i=0;i<s.length;i++) {
    var c=s.charAt(i);
    if(x){o+=c;x=false;continue;}
    if(c==='\\'){o+=c;x=true;continue;}
    if(c==='"'){b=!b;o+=c;continue;}
    if(b){if(c==="'"){o+=' ';continue;}if(c.charCodeAt(0)<32){o+=' ';continue;}}
    else{if(c==='\n'||c==='\r'){o+=' ';continue;}}
    o+=c;
  }
  return o.replace(/,\s*}/g,'}').replace(/,\s*]/g,']');
}

function pj(txt) {
  var pos=0,found=null;
  while(!found) {
    var s=txt.indexOf('{',pos);
    if(s<0) break;
    var e=txt.lastIndexOf('}');
    if(e<=s) break;
    var sl=txt.slice(s,e+1);
    if(sl.indexOf('"sig"')>=0) {
      try{found=JSON.parse(sl);}catch(e1){try{found=JSON.parse(cj(sl));}catch(e2){}}
    }
    pos=s+1;
  }
  if(found) return found;
  var sig=(txt.match(/"sig"\s*:\s*"(BUY|SELL|WAIT)"/)|| [])[1]||'WAIT';
  var conf=parseInt((txt.match(/"conf(?:idence)?"\s*:\s*(\d+)/)||[])[1]||'55');
  var reg=(txt.match(/"reg(?:ime)?"\s*:\s*"(OR_REFUGE|DOLLAR_REFUGE|RISK_ON)"/)|| [])[1]||'DOLLAR_REFUGE';
  return {sig:sig,conf:conf,reg:reg,reg_note:'Extrait auto',vix:'?',vix_dir:'stable',us30:'?',us30_var:'?',dxy:'?',y10:'?',xau:'?',xau_var:'?',trump:'',fed:'',geo:'',h1:sig,h4:sig,h1_note:'',h4_note:'',entree:'?',sl:'?',tp:'?',resume:'Signal extrait auto',alerte:''};
}

// Appel Gemini
function gm(sys, usr, tok, cb) {
  if(!GK||GK.length<10){cb(new Error('Cle API manquante — colle ta nouvelle cle Gemini'));return;}
  var xhr=new XMLHttpRequest();
  xhr.open('POST','https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key='+GK);
  xhr.setRequestHeader('Content-Type','application/json');
  xhr.timeout=60000;
  xhr.ontimeout=function(){cb(new Error('Timeout 60s'));};
  xhr.onerror=function(){cb(new Error('Erreur reseau'));};
  xhr.onload=function(){
    try{
      var d=JSON.parse(xhr.responseText);
      if(d.error){cb(new Error(d.error.message||'Gemini error'));return;}
      var t='';
      if(d.candidates&&d.candidates[0]&&d.candidates[0].content&&d.candidates[0].content.parts){
        var pts=d.candidates[0].content.parts;
        for(var i=0;i<pts.length;i++){if(pts[i].text)t+=pts[i].text;}
      }
      if(!t){cb(new Error('Reponse vide'));return;}
      cb(null,t);
    }catch(ex){cb(ex);}
  };
  xhr.send(JSON.stringify({
    systemInstruction:{parts:[{text:sys}]},
    contents:[{role:'user',parts:[{text:usr}]}],
    generationConfig:{maxOutputTokens:tok||600,temperature:0.3},
    tools:[{google_search:{}}]
  }));
}

  h+='<div class="c" style="margin-bottom:12px"><div style="font-size:9px;color:#4a7090;letter-spacing:3px;margin-bottom:10px">MULTI-TIMEFRAME H1/H4</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">';
  h+='<div style="background:'+sc1+'0a;border:1px solid '+sc1+'33;border-radius:8px;padding:10px"><div style="font-size:9px;color:'+sc1+';font-weight:bold;margin-bottom:4px">H1</div><div style="font-size:22px;font-weight:bold;color:'+sc1+'">'+(raw.h1==='BUY'?'▲':raw.h1==='SELL'?'▼':'●')+' '+(raw.h1||'WAIT')+'</div><div style="font-size:9px;color:'+sc1+'88;margin-top:4px">'+(raw.h1_note||'')+'</div></div>';

  h+='</div><div style="text-align:center;font-size:10px;color:'+cc+';font-weight:bold">'+(raw.h1===raw.h4?'ALIGNES':'DIVERGENTS')+'</div></div>';

  h+='<div class="c" style="border-color:'+sc+'44;background:rgba(0,0,0,.5);margin-bottom:12px"><div style="font-size:9px;color:#2a4060;letter-spacing:3px;margin-bottom:6px">SIGNAL FINAL - XAU/USD</div><div style="font-size:48px;font-weight:bold;color:'+sc+';line-height:1;margin-bottom:8px">'+si+' '+(raw.sig||'WAIT')+'</div><div style="font-size:12px;color:#6a8aaa;line-height:1.6;margin-bottom:10px">'+(raw.resume||'')+'</div><div style="font-size:10px;color:#3a5060">CONFIANCE: <span style="color:'+sc+';font-size:14px;font-weight:bold">'+(raw.conf||55)+'%</span></div></div>';

  var ms=[{a:'XAU/USD',p:raw.xau,v:raw.xau_var,c:'#d4a853'},{a:'DXY',p:raw.dxy,v:'-',c:'#4488ff'},{a:'VIX',p:raw.vix,v:vm?'▲':'▼',c:'#ff44aa'},{a:'US30',p:raw.us30,v:raw.us30_var,c:'#ff6644'}];

      var it=rev[i];var r=it.raw;
      var sc2=r.sig==='BUY'?'#00ff88':r.sig==='SELL'?'#ff4466':'#ffcc44';
      h+='<div style="background:'+sc2+'11;border:1px solid '+sc2+'33;border-radius:8px;padding:8px 12px"><div style="font-size:9px;color:#3a5060;margin-bottom:3px">'+it.t+'</div><div style="font-size:18px;font-weight:bold;color:'+sc2+'">'+(r.sig==='BUY'?'▲':r.sig==='SELL'?'▼':'●')+' '+r.sig+'</div><div style="font-size:10px;color:'+sc2+'99;margin-top:2px">'+(r.conf||55)+'%</div></div>';
    }
    h+='</div></div>';
  }
  h+='<div style="font-size:9px;color:#1a2e40;text-align:center;margin-bottom:16px">OUTIL AIDE DECISION - STOP-LOSS OBLIGATOIRE</div>';
  document.getElementById('rs').innerHTML=h;
}
</script>
