var GK = '';
var GM = false;
var FJD = null;
var HI = [];
var TI = null;
var SI = 0;
var SP = ['Session', 'Regime', 'FJ/Trump', 'DXY/VIX', 'XAU prix', 'Signal H1/H4'];
var MK = {

function p2(n) { return (n < 10 ? '0' : '') + n; }
function fmtTime(d) { return p2(d.getHours()) + ':' + p2(d.getMinutes()) + ':' + p2(d.getSeconds()); }
function fmtDT(d) { return p2(d.getDate()) + '/' + p2(d.getMonth()+1) + '/' + d.getFullYear() + ' ' + fmtTime(d); }

// Horloge
function tick() {
  var d = new Date();
  var hh = d.getHours();
  var sid = (hh >= 23 || hh < 7) ? 'ASIE' : (hh < 16) ? 'EUROPE' : 'AMERIQUE';
  var c = (sid === 'ASIE') ? '#ff6644' : (sid === 'EUROPE') ? '#44aaff' : '#00ff88';
  document.getElementById('clk').textContent = fmtTime(d);
  document.getElementById('clk').style.color = c;
  document.getElementById('sess').textContent = 'LIVE - ' + sid;
  document.getElementById('sess').style.color = c;
  document.getElementById('sb').style.color = c;
  document.getElementById('sb').style.borderColor = c + '44';
}
tick();
setInterval(tick, 1000);

// Cle sauvegardee
try {
  var _k = localStorage.getItem('gk2');
  if (_k && _k.length > 10) { GK = _k; document.getElementById('keysec').style.display = 'none'; }
} catch(e) {}

document.getElementById('mb').addEventListener('click', function() {

  this.style.color = GM ? '#ffcc44' : '#4a6070';
});

// Parser JSON
function pj(txt) {
  var clean = txt.replace(/```json/gi, '').replace(/```/g, '').trim();
  var found = null, start = 0;
  while (!found) {
    var s = clean.indexOf('{', start);
    if (s < 0) break;
    var depth = 0, e = -1;
    for (var i = s; i < clean.length; i++) {
      if (clean[i] === '{') depth++;
      else if (clean[i] === '}') { depth--; if (depth === 0) { e = i; break; } }
    }
    if (e < 0) break;
    var sl = clean.slice(s, e + 1);
    if (sl.indexOf('"sig"') >= 0) {
      try { found = JSON.parse(sl); break; } catch(e1) {}
      var fx = '', inS = false, esc = false;
      for (var j = 0; j < sl.length; j++) {
        var ch = sl[j];
        if (esc) { fx += ch; esc = false; continue; }
        if (ch === '\\') { fx += ch; esc = true; continue; }
        if (ch === '"') { inS = !inS; fx += ch; continue; }
        if (inS) { if (ch === "'") { fx += ' '; continue; } if (ch.charCodeAt(0) < 32) { fx += ' '; continue; } }
        else { if (ch === '\n' || ch === '\r') { fx += ' '; continue; } }
        fx += ch;
      }
      fx = fx.replace(/,\s*}/g, '}').replace(/,\s*]/g, ']');
      try { found = JSON.parse(fx); break; } catch(e2) {}
    }
    start = s + 1;
  }
  if (found) return found;
  var sig = (txt.match(/"sig"\s*:\s*"(BUY|SELL|WAIT)"/) || [])[1] || 'WAIT';
  var conf = parseInt((txt.match(/"conf"\s*:\s*(\d+)/) || [])[1] || '55');
  var reg = (txt.match(/"reg"\s*:\s*"(OR_REFUGE|DOLLAR_REFUGE|RISK_ON)"/) || [])[1] || 'DOLLAR_REFUGE';
  var xau = (txt.match(/"xau"\s*:\s*"?([\d.]+)"?/) || [])[1] || '?';
  var dxy = (txt.match(/"dxy"\s*:\s*"?([\d.]+)"?/) || [])[1] || '?';
  var vix = (txt.match(/"vix"\s*:\s*"?([\d.]+)"?/) || [])[1] || '?';
  return { sig:sig, conf:conf, reg:reg, reg_note:'Extrait auto', vix:vix, vix_dir:'stable',
    us30:'?', us30_var:'?', dxy:dxy, y10:'?', xau:xau, xau_var:'?',
    trump:'', fed:'', geo:'', h1:sig, h4:sig, h1_note:'', h4_note:'',
    entree:'?', sl:'?', tp:'?', resume:'Signal extrait auto', alerte:'' };
}

// Appel Gemini
function gmCall(sys, usr, tok, cb) {
  if (!GK || GK.length < 10) { cb(new Error('Cle API manquante')); return; }
  var xhr = new XMLHttpRequest();
  xhr.open('POST', 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + GK);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.timeout = 60000;
  xhr.ontimeout = function() { cb(new Error('Timeout 60s')); };
  xhr.onerror = function() { cb(new Error('Erreur reseau')); };
  xhr.onload = function() {
    try {
      var d = JSON.parse(xhr.responseText);
      if (d.error) { cb(new Error(d.error.message || 'Gemini error')); return; }
      var t = '';
      if (d.candidates && d.candidates[0] && d.candidates[0].content && d.candidates[0].content.parts) {
        var pts = d.candidates[0].content.parts;
        for (var i = 0; i < pts.length; i++) { if (pts[i].text) t += pts[i].text; }
      }
      document.getElementById('dbg').style.display = 'block';
      document.getElementById('dbg').textContent = 'RAW: ' + t.slice(0, 400);
      if (!t) { cb(new Error('Reponse vide')); return; }
      cb(null, t);
    } catch(ex) { cb(ex); }
  };
  xhr.send(JSON.stringify({
    systemInstruction: { parts: [{ text: sys }] },
    contents: [{ role: 'user', parts: [{ text: usr }] }],
    generationConfig: { maxOutputTokens: tok || 800, temperature: 0.2 },
    tools: [{ googleSearch: {} }]
  }));
}

// FJ
document.getElementById('fjbtn').addEventListener('click', function() {
  document.getElementById('fj').textContent = 'Scan en cours...';
  var sys = 'Expert XAU/USD. Cherche headlines recentes financialjuice.com impactant or, DXY, VIX, Fed, Trump, Iran. JSON sans markdown: {"h":[{"t":"headline","heure":"HH:MM","niv":"CRITIQUE","imp":"haussier"}],"resume":"synthese"}';
  gmCall(sys, 'Headlines FinancialJuice or XAU USD maintenant', 500, function(err, txt) {
    if (err) { document.getElementById('fj').textContent = 'Erreur: ' + err.message; return; }
    try {
      FJD = pj(txt);
      var h = '';
      if (FJD.resume) h += '<div style="font-size:11px;color:#6a8890;margin-bottom:8px">' + FJD.resume + '</div>';
      var arr = FJD.h || [];
      for (var i = 0; i < arr.length; i++) {

        var col = it.niv === 'CRITIQUE' ? '#ff2244' : it.niv === 'ELEVE' ? '#ff8822' : '#ffcc44';
        var icc = it.imp === 'haussier' ? '#00ff88' : it.imp === 'baissier' ? '#ff4466' : '#ffcc44';
        var ic = it.imp === 'haussier' ? '[+]' : it.imp === 'baissier' ? '[-]' : '[=]';
        h += '<div style="border-left:3px solid ' + col + ';padding:6px 10px;margin-bottom:4px;display:flex;justify-content:space-between;gap:8px">';
        h += '<div><div style="font-size:9px;color:' + col + ';font-weight:bold">' + it.niv + (it.heure ? ' ' + it.heure : '') + '</div>';
        h += '<div style="font-size:11px;color:#8aaccc">' + it.t + '</div></div>';
        h += '<span style="color:' + icc + ';font-size:13px;font-weight:bold">' + ic + '</span></div>';
      }
      document.getElementById('fj').innerHTML = h || 'Aucune headline';
    } catch(ex) { document.getElementById('fj').textContent = 'Parse error: ' + ex.message; }
  });
});

// Prompt
function getP() {
  var hh = new Date().getHours();
  var sid = (hh >= 23 || hh < 7) ? 'ASIE' : (hh < 16) ? 'EUROPE' : 'AMERIQUE';
  var fj = '';
  if (FJD && FJD.h && FJD.h.length > 0) {
    var t = [];
    for (var i = 0; i < Math.min(3, FJD.h.length); i++) t.push(FJD.h[i].t);
    fj = 'Headlines: ' + t.join(' | ');
  }
  return 'Expert trader XAU/USD avec Google Search temps reel. Session: ' + sid + '. ' + fj +
    '\nREGLE: DXY monte=OR BAISSE. DXY baisse=OR MONTE. Toujours.' +
    '\nREGIMES: VIX>25 OU conflit=DOLLAR_REFUGE. OR_REFUGE si VIX<20. RISK_ON si actions montent.' +
    '\nRecherche: XAU prix actuel, DXY valeur+direction, VIX, Trump, Fed, Iran.' +
    '\nJSON une ligne sans markdown sans apostrophe:' +
    '\n{"sig":"BUY","conf":72,"reg":"DOLLAR_REFUGE","reg_note":"raison","vix":"27.0","vix_dir":"baisse","us30":"45800","us30_var":"-1.7%","dxy":"100.2","y10":"4.41%","xau":"3120","xau_var":"+0.5%","trump":"texte","fed":"texte","geo":"texte","h1":"BUY","h4":"SELL","h1_note":"raison","h4_note":"raison","entree":"3100-3120","sl":"3060","tp":"3200","resume":"signal","alerte":"alerte"}';
}

// Scan
document.getElementById('sb').addEventListener('click', function() {
  if (!GM && (!GK || GK.length < 10)) {
    document.getElementById('keysec').style.display = 'block';
    document.getElementById('er').style.display = 'block';
    document.getElementById('er').textContent = 'Colle ta cle Gemini et clique Sauver';
    return;
  }
  document.getElementById('ld').style.display = 'block';
  document.getElementById('rs').innerHTML = '';
  document.getElementById('er').style.display = 'none';
  document.getElementById('dbg').style.display = 'none';
  document.getElementById('sb').disabled = true;
  document.getElementById('sb').textContent = 'ANALYSE...';
  SI = 0; clearInterval(TI);
  TI = setInterval(function() {
    SI = Math.min(SI + 1, SP.length - 1);
    var h = '';
    for (var i = 0; i < SP.length; i++) {
      var col = i < SI ? 'rgba(0,255,136,.4)' : i === SI ? '#00ff88' : '#1a2e40';
      var mk = i < SI ? 'OK' : i === SI ? '>>' : '--';
      h += '<div style="font-size:10px;padding:3px 0;display:flex;gap:8px;color:' + col + '"><span>' + mk + '</span>' + SP[i] + '</div>';
    }
    document.getElementById('st').innerHTML = h;
  }, 1500);

  function done(raw) {
    clearInterval(TI);
    document.getElementById('ld').style.display = 'none';
    document.getElementById('sb').disabled = false;
    document.getElementById('sb').textContent = 'ANALYSER';
    showR(raw);
    HI = HI.slice(-9);
    HI.push({ raw: raw, t: fmtTime(new Date()) });
    document.getElementById('lu').textContent = 'Analyse: ' + fmtTime(new Date()) + ' - ' + HI.length + ' signal(s)';
  }
  function fail(msg) {
    clearInterval(TI);
    document.getElementById('ld').style.display = 'none';
    document.getElementById('sb').disabled = false;
    document.getElementById('sb').textContent = 'ANALYSER';
    document.getElementById('er').style.display = 'block';
    document.getElementById('er').textContent = 'Erreur: ' + msg;
  }
  if (GM) { setTimeout(function() { done(MK); }, 1500); return; }
  gmCall(getP(), 'Analyse XAU/USD maintenant ' + fmtDT(new Date()), 800, function(err, txt) {
    if (err) { fail(err.message); return; }
    try { done(pj(txt)); } catch(ex) { fail('Parse: ' + ex.message); }
  });
});

// Affichage
function showR(raw) {
  var vv = parseFloat(raw.vix || '0');
  var vm = raw.vix_dir === 'monte';
  var reg = raw.reg || 'DOLLAR_REFUGE';
  if ((vv > 25 || vm) && reg === 'OR_REFUGE') reg = 'DOLLAR_REFUGE';
  var sc = raw.sig === 'BUY' ? '#00ff88' : raw.sig === 'SELL' ? '#ff4466' : '#ffcc44';
  var arrow = raw.sig === 'BUY' ? 'BUY [+]' : raw.sig === 'SELL' ? 'SELL [-]' : 'WAIT';
  var rLabel = reg === 'DOLLAR_REFUGE' ? 'DOLLAR = REFUGE' : reg === 'OR_REFUGE' ? 'OR = REFUGE' : 'RISK-ON';
  var rC = reg === 'DOLLAR_REFUGE' ? '#4488ff' : reg === 'OR_REFUGE' ? '#d4a853' : '#ff6644';
  var h = '';
  if (raw.alerte) {
    h += '<div class="c" style="border-color:rgba(255,136,34,.3);background:rgba(255,136,34,.06);margin-bottom:8px">';
    h += '<div style="font-size:9px;color:#ff8822;font-weight:bold;margin-bottom:4px">!! ALERTE</div>';
    h += '<div style="font-size:11px;color:#ff8822;line-height:1.5">' + raw.alerte + '</div></div>';
  }
  h += '<div class="c" style="border-color:' + rC + '55;margin-bottom:12px">';
  h += '<div style="font-size:9px;color:' + rC + ';font-weight:bold;letter-spacing:2px;margin-bottom:4px">REGIME - ' + rLabel + '</div>';
  h += '<div style="font-size:11px;color:' + rC + 'aa;line-height:1.6">' + (raw.reg_note || '') + '</div></div>';
  var sc1 = raw.h1 === 'BUY' ? '#00ff88' : raw.h1 === 'SELL' ? '#ff4466' : '#ffcc44';
  var sc4 = raw.h4 === 'BUY' ? '#00ff88' : raw.h4 === 'SELL' ? '#ff4466' : '#ffcc44';
  h += '<div class="c" style="margin-bottom:12px">';
  h += '<div style="font-size:9px;color:#4a7090;letter-spacing:3px;margin-bottom:10px">MULTI-TIMEFRAME H1/H4</div>';
  h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">';
  h += '<div style="border:1px solid ' + sc1 + '44;border-radius:8px;padding:10px">';
  h += '<div style="font-size:9px;color:' + sc1 + ';font-weight:bold">H1</div>';
  h += '<div style="font-size:22px;font-weight:bold;color:' + sc1 + '">' + (raw.h1 || 'WAIT') + '</div>';
  h += '<div style="font-size:9px;color:' + sc1 + '88">' + (raw.h1_note || '') + '</div></div>';
  h += '<div style="border:1px solid ' + sc4 + '44;border-radius:8px;padding:10px">';
  h += '<div style="font-size:9px;color:' + sc4 + ';font-weight:bold">H4</div>';
  h += '<div style="font-size:22px;font-weight:bold;color:' + sc4 + '">' + (raw.h4 || 'WAIT') + '</div>';
  h += '<div style="font-size:9px;color:' + sc4 + '88">' + (raw.h4_note || '') + '</div></div>';
  h += '</div><div style="text-align:center;font-size:10px;color:' + (raw.h1 === raw.h4 ? '#00ff88' : '#ffcc44') + ';font-weight:bold">' + (raw.h1 === raw.h4 ? 'ALIGNES' : 'DIVERGENTS') + '</div></div>';
  h += '<div class="c" style="border:2px solid ' + sc + '55;margin-bottom:12px">';
  h += '<div style="font-size:9px;color:#2a4060;letter-spacing:3px;margin-bottom:6px">SIGNAL FINAL - XAU/USD</div>';
  h += '<div style="font-size:40px;font-weight:bold;color:' + sc + ';line-height:1.1;margin-bottom:8px">' + arrow + '</div>';
  h += '<div style="font-size:12px;color:#6a8aaa;line-height:1.6;margin-bottom:10px">' + (raw.resume || '') + '</div>';
  h += '<div style="font-size:10px;color:#3a5060">CONFIANCE: <span style="color:' + sc + ';font-size:14px;font-weight:bold">' + (raw.conf || 55) + '%</span></div></div>';
  var ms = [
    { a: 'XAU/USD', p: raw.xau, v: raw.xau_var, c: '#d4a853' },
    { a: 'DXY', p: raw.dxy, v: vm ? 'monte' : 'baisse', c: '#4488ff' },
    { a: 'VIX', p: raw.vix, v: vm ? 'monte' : 'baisse', c: '#ff44aa' },
    { a: 'T10Y', p: raw.y10, v: '', c: '#8866ff' },
    { a: 'US30', p: raw.us30, v: raw.us30_var, c: '#ff6644' }
  ];
  h += '<div class="c" style="margin-bottom:12px">';
  h += '<div style="font-size:9px;color:#4a7090;letter-spacing:3px;margin-bottom:10px">MARCHES EN DIRECT</div>';
  h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
  for (var i = 0; i < ms.length; i++) {
    var m = ms[i]; if (!m.p || m.p === '?') continue;
    var vc = (m.v && m.v.indexOf('-') >= 0) ? '#ff4466' : '#00ff88';
    h += '<div style="border:1px solid ' + m.c + '33;border-radius:8px;padding:10px">';
    h += '<div style="font-size:9px;color:' + m.c + ';font-weight:bold">' + m.a + '</div>';
    h += '<div style="font-size:14px;color:#8aaccc;font-weight:bold">' + m.p + '</div>';
    h += '<div style="font-size:11px;color:' + vc + '">' + m.v + '</div></div>';
  }
  h += '</div></div>';
  var ns = [];
  if (raw.trump) ns.push({ src: 'TRUMP', txt: raw.trump });
  if (raw.fed) ns.push({ src: 'FED', txt: raw.fed });
