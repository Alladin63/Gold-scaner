<script>
window.onerror = function(msg, src, line) {
  var el = document.getElementById('gs_err');
  if (el) { el.style.display = 'block'; el.textContent = 'ERR L' + line + ': ' + msg; }
};
function gs_pad(n) { return n < 10 ? '0' + n : '' + n; }
function gs_time(d) { return gs_pad(d.getHours()) + ':' + gs_pad(d.getMinutes()) + ':' + gs_pad(d.getSeconds()); }
function gs_tick() {
  try {
    var d = new Date();
    var hh = d.getHours();
    var sid = (hh >= 23 || hh < 7) ? 'ASIE' : (hh < 16) ? 'EUROPE' : 'AMERIQUE';
    var c = sid === 'ASIE' ? '#ff6644' : sid === 'EUROPE' ? '#44aaff' : '#00ff88';
    document.getElementById('gs_clk').textContent = gs_time(d);
    document.getElementById('gs_clk').style.color = c;
    document.getElementById('gs_sess').textContent = 'LIVE - ' + sid;
    document.getElementById('gs_sess').style.color = c;
    var sb = document.getElementById('gs_scan');
    if (sb) { sb.style.color = c; sb.style.borderColor = c + '44'; }
  } catch(e) {
    var el = document.getElementById('gs_err');
    if (el) { el.style.display = 'block'; el.textContent = 'TICK ERR: ' + e.message; }
  }
}
gs_tick();
setInterval(gs_tick, 1000);
</script>

<div class="gc">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">

</div>

  <button id="gs_scan" style="flex:1;padding:14px;background:rgba(0,255,136,.12);border:1px solid rgba(0,255,136,.35);border-radius:10px;color:#00ff88;font-size:13px;font-weight:bold;cursor:pointer">ANALYSER</button>
  <button id="gs_mock" style="padding:14px 12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#4a6070;font-size:9px;font-weight:bold;cursor:pointer">MOCK</button>

</div>
<div id="gs_apierr" style="display:none;border:1px solid rgba(255,68,68,.2);border-radius:10px;padding:12px;color:#ff6680;font-size:11px;margin-bottom:12px"></div>
<div id="gs_dbg" style="display:none;border:1px solid rgba(100,100,255,.2);border-radius:10px;padding:10px;color:#6080ff;font-size:9px;margin-bottom:12px;word-break:break-all;max-height:150px;overflow:auto"></div>
<div id="gs_rs"></div>

<script>
var GS_KEY = '';
var GS_MOCK = false;
var GS_FJD = null;
var GS_HI = [];
var GS_TI = null;
var GS_SI = 0;
var GS_SP = ['Session', 'Regime', 'FJ/Trump', 'DXY/VIX', 'XAU prix', 'Signal H1/H4'];
var GS_MK = {
  sig:'SELL', conf:72, reg:'DOLLAR_REFUGE', reg_note:'VIX 27 + guerre Iran active',
  vix:'27.2', vix_dir:'baisse', us30:'45800', us30_var:'-1.7%', dxy:'100.2', y10:'4.41%',
  xau:'3120', xau_var:'+1.2%', trump:'Trump WSJ Iran accord proche',
  fed:'Fed hawkish 1 coupe 2026', geo:'Desescalade Iran DXY chute',
  h1:'BUY', h4:'SELL', h1_note:'DXY chute apres news Trump', h4_note:'Tendance baissiere persiste',
  entree:'3100-3120', sl:'3060', tp:'3200',
  resume:'DXY baisse apres desescalade Iran or rebondit court terme',
  alerte:'VIX baisse 27 surveiller DXY pour confirmer BUY'
};

function gs_dt(d) {
  return gs_pad(d.getDate()) + '/' + gs_pad(d.getMonth()+1) + '/' + d.getFullYear() + ' ' + gs_time(d);
}

try {
  var _k = localStorage.getItem('gs_key');
  if (_k && _k.length > 10) { GS_KEY = _k; document.getElementById('gs_keysec').style.display = 'none'; }
} catch(e) {}

document.getElementById('gs_save').addEventListener('click', function() {
  var v = document.getElementById('gs_ki').value.trim();
  if (!v || v.length < 10) { document.getElementById('gs_ks').textContent = 'Cle trop courte'; return; }
  GS_KEY = v;
  try { localStorage.setItem('gs_key', v); } catch(e) {}
  document.getElementById('gs_keysec').style.display = 'none';
  document.getElementById('gs_lu').textContent = 'Cle sauvegardee';
});

document.getElementById('gs_mock').addEventListener('click', function() {
  GS_MOCK = !GS_MOCK;
  this.textContent = GS_MOCK ? 'MOCK ON' : 'MOCK';
  this.style.background = GS_MOCK ? 'rgba(255,204,68,.15)' : 'rgba(255,255,255,.03)';
  this.style.color = GS_MOCK ? '#ffcc44' : '#4a6070';
});

function gs_pj(txt) {
  var clean = txt.replace(/```json/gi, '').replace(/```/g, '').trim();
  var found = null, start = 0;
  while (!found) {
    var s = clean.indexOf('{', start);
    if (s < 0) break;
    var depth = 0, e = -1;
    for (var i = s; i < clean.length; i++) {
      if (clean[i] === '{') depth++;
      else if (clean[i] === '}') { depth--; if (depth === 0) { e = i; break; } }
    }
    if (e < 0) break;
    var sl = clean.slice(s, e + 1);
    if (sl.indexOf('"sig"') >= 0) {
      try { found = JSON.parse(sl); break; } catch(ea) {}
      var fx = '', inS = false, esc = false;
      for (var j = 0; j < sl.length; j++) {
        var ch = sl[j];
        if (esc) { fx += ch; esc = false; continue; }
        if (ch === '\\') { fx += ch; esc = true; continue; }
        if (ch === '"') { inS = !inS; fx += ch; continue; }
        if (inS) { if (ch === "'") { fx += ' '; continue; } if (ch.charCodeAt(0) < 32) { fx += ' '; continue; } }
        else { if (ch === '\n' || ch === '\r') { fx += ' '; continue; } }
        fx += ch;
      }
      fx = fx.replace(/,\s*}/g, '}').replace(/,\s*]/g, ']');
      try { found = JSON.parse(fx); break; } catch(eb) {}
    }
    start = s + 1;
  }
  if (found) return found;
  var sig = (txt.match(/"sig"\s*:\s*"(BUY|SELL|WAIT)"/) || [])[1] || 'WAIT';
  var conf = parseInt((txt.match(/"conf"\s*:\s*(\d+)/) || [])[1] || '55');
  var reg = (txt.match(/"reg"\s*:\s*"(OR_REFUGE|DOLLAR_REFUGE|RISK_ON)"/) || [])[1] || 'DOLLAR_REFUGE';
  var xau = (txt.match(/"xau"\s*:\s*"?([\d.]+)"?/) || [])[1] || '?';
  var dxy = (txt.match(/"dxy"\s*:\s*"?([\d.]+)"?/) || [])[1] || '?';
  var vix = (txt.match(/"vix"\s*:\s*"?([\d.]+)"?/) || [])[1] || '?';
  return { sig:sig, conf:conf, reg:reg, reg_note:'Extrait auto', vix:vix, vix_dir:'stable',
    us30:'?', us30_var:'?', dxy:dxy, y10:'?', xau:xau, xau_var:'?',
    trump:'', fed:'', geo:'', h1:sig, h4:sig, h1_note:'', h4_note:'',
    entree:'?', sl:'?', tp:'?', resume:'Signal extrait auto', alerte:'' };
}

function gs_api(sys, usr, tok, cb) {
  if (!GS_KEY || GS_KEY.length < 10) { cb(new Error('Cle API manquante')); return; }
  var xhr = new XMLHttpRequest();
  xhr.open('POST', 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + GS_KEY);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.timeout = 60000;
  xhr.ontimeout = function() { cb(new Error('Timeout 60s')); };
  xhr.onerror = function() { cb(new Error('Erreur reseau')); };
  xhr.onload = function() {
    try {
      var d = JSON.parse(xhr.responseText);
      if (d.error) { cb(new Error(d.error.message || 'Gemini error')); return; }
      var t = '';
      if (d.candidates && d.candidates[0] && d.candidates[0].content && d.candidates[0].content.parts) {
        var pts = d.candidates[0].content.parts;
        for (var i = 0; i < pts.length; i++) { if (pts[i].text) t += pts[i].text; }
      }
      document.getElementById('gs_dbg').style.display = 'block';
      document.getElementById('gs_dbg').textContent = 'RAW: ' + t.slice(0, 400);
      if (!t) { cb(new Error('Reponse vide')); return; }
      cb(null, t);
    } catch(ex) { cb(ex); }
  };
  xhr.send(JSON.stringify({
    systemInstruction: { parts: [{ text: sys }] },
    contents: [{ role: 'user', parts: [{ text: usr }] }],
    generationConfig: { maxOutputTokens: tok || 800, temperature: 0.2 },
    tools: [{ googleSearch: {} }]
  }));
}

document.getElementById('gs_fj').addEventListener('click', function() {
  document.getElementById('gs_fjout').textContent = 'Scan en cours...';
  var sys = 'Expert XAU/USD. Cherche headlines recentes financialjuice.com impactant or, DXY, VIX, Fed, Trump, Iran. JSON sans markdown: {"h":[{"t":"headline","heure":"HH:MM","niv":"CRITIQUE","imp":"haussier"}],"resume":"synthese"}';
  gs_api(sys, 'Headlines FinancialJuice or XAU USD maintenant', 500, function(err, txt) {
    if (err) { document.getElementById('gs_fjout').textContent = 'Erreur: ' + err.message; return; }
    try {
      GS_FJD = gs_pj(txt);
      var h = '';
      if (GS_FJD.resume) h += '<div style="font-size:11px;color:#6a8890;margin-bottom:8px">' + GS_FJD.resume + '</div>';
      var arr = GS_FJD.h || [];
      for (var i = 0; i < arr.length; i++) {
        var it = arr[i];
        var col = it.niv === 'CRITIQUE' ? '#ff2244' : it.niv === 'ELEVE' ? '#ff8822' : '#ffcc44';
        var icc = it.imp === 'haussier' ? '#00ff88' : it.imp === 'baissier' ? '#ff4466' : '#ffcc44';
        var ic = it.imp === 'haussier' ? '[+]' : it.imp === 'baissier' ? '[-]' : '[=]';
        h += '<div style="border-left:3px solid ' + col + ';padding:6px 10px;margin-bottom:4px;display:flex;justify-content:space-between;gap:8px">';
        h += '<div><div style="font-size:9px;color:' + col + ';font-weight:bold">' + it.niv + (it.heure ? ' ' + it.heure : '') + '</div>';
        h += '<div style="font-size:11px;color:#8aaccc">' + it.t + '</div></div>';
        h += '<span style="color:' + icc + ';font-size:13px;font-weight:bold">' + ic + '</span></div>';
      }
      document.getElementById('gs_fjout').innerHTML = h || 'Aucune headline';
    } catch(ex) { document.getElementById('gs_fjout').textContent = 'Parse error: ' + ex.message; }
  });
});

function gs_prompt() {
  var hh = new Date().getHours();
  var sid = (hh >= 23 || hh < 7) ? 'ASIE' : (hh < 16) ? 'EUROPE' : 'AMERIQUE';
  var fj = '';
  if (GS_FJD && GS_FJD.h && GS_FJD.h.length > 0) {
    var t = [];
    for (var i = 0; i < Math.min(3, GS_FJD.h.length); i++) t.push(GS_FJD.h[i].t);
    fj = 'Headlines: ' + t.join(' | ');
  }
  return 'Expert trader XAU/USD avec Google Search temps reel. Session: ' + sid + '. ' + fj +
    '\nREGLE: DXY monte=OR BAISSE. DXY baisse=OR MONTE. Toujours.' +
    '\nREGIMES: VIX>25 OU conflit=DOLLAR_REFUGE. OR_REFUGE si VIX<20. RISK_ON si actions montent.' +
    '\nRecherche: XAU prix actuel, DXY valeur+direction, VIX, Trump, Fed, Iran.' +
    '\nJSON une ligne sans markdown sans apostrophe:' +
    '\n{"sig":"BUY","conf":72,"reg":"DOLLAR_REFUGE","reg_note":"raison","vix":"27.0","vix_dir":"baisse","us30":"45800","us30_var":"-1.7%","dxy":"100.2","y10":"4.41%","xau":"3120","xau_var":"+0.5%","trump":"texte","fed":"texte","geo":"texte","h1":"BUY","h4":"SELL","h1_note":"raison","h4_note":"raison","entree":"3100-3120","sl":"3060","tp":"3200","resume":"signal","alerte":"alerte"}';
}

document.getElementById('gs_scan').addEventListener('click', function() {
  if (!GS_MOCK && (!GS_KEY || GS_KEY.length < 10)) {
    document.getElementById('gs_keysec').style.display = 'block';
    document.getElementById('gs_apierr').style.display = 'block';
    document.getElementById('gs_apierr').textContent = 'Colle ta cle Gemini et clique Sauver';
    return;
  }
  document.getElementById('gs_ld').style.display = 'block';
  document.getElementById('gs_rs').innerHTML = '';
  document.getElementById('gs_apierr').style.display = 'none';
  document.getElementById('gs_dbg').style.display = 'none';
  document.getElementById('gs_scan').disabled = true;
  document.getElementById('gs_scan').textContent = 'ANALYSE...';
  GS_SI = 0; clearInterval(GS_TI);
  GS_TI = setInterval(function() {
    GS_SI = Math.min(GS_SI + 1, GS_SP.length - 1);
    var h = '';
    for (var i = 0; i < GS_SP.length; i++) {
      var col = i < GS_SI ? 'rgba(0,255,136,.4)' : i === GS_SI ? '#00ff88' : '#1a2e40';
      var mk = i < GS_SI ? 'OK' : i === GS_SI ? '>>' : '--';
      h += '<div style="font-size:10px;padding:3px 0;display:flex;gap:8px;color:' + col + '"><span>' + mk + '</span>' + GS_SP[i] + '</div>';
    }
    document.getElementById('gs_st').innerHTML = h;
  }, 1500);

  function gs_done(raw) {
    clearInterval(GS_TI);
    document.getElementById('gs_ld').style.display = 'none';
    document.getElementById('gs_scan').disabled = false;
    document.getElementById('gs_scan').textContent = 'ANALYSER';
    gs_showR(raw);
    GS_HI = GS_HI.slice(-9);
    GS_HI.push({ raw: raw, t: gs_time(new Date()) });
    document.getElementById('gs_lu').textContent = 'Analyse: ' + gs_time(new Date()) + ' - ' + GS_HI.length + ' signal(s)';
  }
  function gs_fail(msg) {
    clearInterval(GS_TI);
    document.getElementById('gs_ld').style.display = 'none';
    document.getElementById('gs_scan').disabled = false;
    document.getElementById('gs_scan').textContent = 'ANALYSER';
    document.getElementById('gs_apierr').style.display = 'block';
    document.getElementById('gs_apierr').textContent = 'Erreur: ' + msg;
  }
  if (GS_MOCK) { setTimeout(function() { gs_done(GS_MK); }, 1500); return; }
  gs_api(gs_prompt(), 'Analyse XAU/USD maintenant ' + gs_dt(new Date()), 800, function(err, txt) {
    if (err) { gs_fail(err.message); return; }
    try { gs_done(gs_pj(txt)); } catch(ex) { gs_fail('Parse: ' + ex.message); }
  });
});

function gs_showR(raw) {
  var vv = parseFloat(raw.vix || '0');
  var vm = raw.vix_dir === 'monte';
  var reg = raw.reg || 'DOLLAR_REFUGE';
  if ((vv > 25 || vm) && reg === 'OR_REFUGE') reg = 'DOLLAR_REFUGE';
  var sc = raw.sig === 'BUY' ? '#00ff88' : raw.sig === 'SELL' ? '#ff4466' : '#ffcc44';
  var arrow = raw.sig === 'BUY' ? 'BUY [+]' : raw.sig === 'SELL' ? 'SELL [-]' : 'WAIT';
  var rLabel = reg === 'DOLLAR_REFUGE' ? 'DOLLAR = REFUGE' : reg === 'OR_REFUGE' ? 'OR = REFUGE' : 'RISK-ON';
  var rC = reg === 'DOLLAR_REFUGE' ? '#4488ff' : reg === 'OR_REFUGE' ? '#d4a853' : '#ff6644';
  var h = '';
  if (raw.alerte) {
    h += '<div class="gc" style="border-color:rgba(255,136,34,.3);background:rgba(255,136,34,.06);margin-bottom:8px">';
    h += '<div style="font-size:9px;color:#ff8822;font-weight:bold;margin-bottom:4px">!! ALERTE</div>';
    h += '<div style="font-size:11px;color:#ff8822;line-height:1.5">' + raw.alerte + '</div></div>';
  }
  h += '<div class="gc" style="border-color:' + rC + '55;margin-bottom:12px">';
  h += '<div style="font-size:9px;color:' + rC + ';font-weight:bold;letter-spacing:2px;margin-bottom:4px">REGIME - ' + rLabel + '</div>';
  h += '<div style="font-size:11px;color:' + rC + 'aa;line-height:1.6">' + (raw.reg_note || '') + '</div></div>';
  var sc1 = raw.h1 === 'BUY' ? '#00ff88' : raw.h1 === 'SELL' ? '#ff4466' : '#ffcc44';
  var sc4 = raw.h4 === 'BUY' ? '#00ff88' : raw.h4 === 'SELL' ? '#ff4466' : '#ffcc44';
  h += '<div class="gc" style="margin-bottom:12px">';
  h += '<div style="font-size:9px;color:#4a7090;letter-spacing:3px;margin-bottom:10px">MULTI-TIMEFRAME H1/H4</div>';
  h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">';
  h += '<div style="border:1px solid ' + sc1 + '44;border-radius:8px;padding:10px">';
  h += '<div style="font-size:9px;color:' + sc1 + ';font-weight:bold">H1</div>';
  h += '<div style="font-size:22px;font-weight:bold;color:' + sc1 + '">' + (raw.h1 || 'WAIT') + '</div>';
  h += '<div style="font-size:9px;color:' + sc1 + '88">' + (raw.h1_note || '') + '</div></div>';
  h += '<div style="border:1px solid ' + sc4 + '44;border-radius:8px;padding:10px">';
  h += '<div style="font-size:9px;color:' + sc4 + ';font-weight:bold">H4</div>';
  h += '<div style="font-size:22px;font-weight:bold;color:' + sc4 + '">' + (raw.h4 || 'WAIT') + '</div>';
  h += '<div style="font-size:9px;color:' + sc4 + '88">' + (raw.h4_note || '') + '</div></div>';
  h += '</div><div style="text-align:center;font-size:10px;color:' + (raw.h1 === raw.h4 ? '#00ff88' : '#ffcc44') + ';font-weight:bold">' + (raw.h1 === raw.h4 ? 'ALIGNES' : 'DIVERGENTS') + '</div></div>';
  h += '<div class="gc" style="border:2px solid ' + sc + '55;margin-bottom:12px">';
  h += '<div style="font-size:9px;color:#2a4060;letter-spacing:3px;margin-bottom:6px">SIGNAL FINAL - XAU/USD</div>';
  h += '<div style="font-size:40px;font-weight:bold;color:' + sc + ';line-height:1.1;margin-bottom:8px">' + arrow + '</div>';
  h += '<div style="font-size:12px;color:#6a8aaa;line-height:1.6;margin-bottom:10px">' + (raw.resume || '') + '</div>';
  h += '<div style="font-size:10px;color:#3a5060">CONFIANCE: <span style="color:' + sc + ';font-size:14px;font-weight:bold">' + (raw.conf || 55) + '%</span></div></div>';
  var ms = [
    { a: 'XAU/USD', p: raw.xau, v: raw.xau_var, c: '#d4a853' },
    { a: 'DXY', p: raw.dxy, v: vm ? 'monte' : 'baisse', c: '#4488ff' },
    { a: 'VIX', p: raw.vix, v: vm ? 'monte' : 'baisse', c: '#ff44aa' },
    { a: 'T10Y', p: raw.y10, v: '', c: '#8866ff' },
    { a: 'US30', p: raw.us30, v: raw.us30_var, c: '#ff6644' }
  ];
  h += '<div class="gc" style="margin-bottom:12px">';
  h += '<div style="font-size:9px;color:#4a7090;letter-spacing:3px;margin-bottom:10px">MARCHES EN DIRECT</div>';
